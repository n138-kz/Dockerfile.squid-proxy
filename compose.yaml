services:
  pac-server:
    build:
      context: ./pac-server
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    volumes:
      - type: bind
        source: ./proxy-pac
        target: /usr/share/nginx/html
      - type: bind
        source: ./nginx-config
        target: /etc/nginx/conf.d
    ports:
      - "8081:80"
  proxy-server:
    build:
      context: ./proxy-server
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
    volumes:
      - type: bind
        source: ./squid-config
        target: /etc/squid
    ports:
      - 3128:3128
      - 3128:3128/UDP
      - 8080:3128
      - 8080:3128/UDP
