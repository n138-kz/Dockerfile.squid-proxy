services:
  pac-server:
    image: nginx:alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1024k"
    volumes:
      - type: bind
        source: ./proxy-pac
        target: /usr/share/nginx/html
      - type: bind
        source: ./nginx-config
        target: /etc/nginx/conf.d.test.d
    ports:
      - "8081:80"
  proxy-server:
    build: 
      context: .
      dockerfile: Dockerfile-proxy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "1024k"
    volumes:
      - type: bind
        source: ./squid-config
        target: /etc/squid
    ports:
      - 3128:3128
      - 3128:3128/UDP
      - 8080:3128
      - 8080:3128/UDP
